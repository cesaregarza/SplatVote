  - name: Find a stable team / teammates
  - name: Do well in tournaments
  - name: Become known / build reputation
  - name: Enter / stay in a prestige server / tier (e.g., Plus)
  - name: Have fun / play with friends
  - name: Coach others / contribute to scene
  - name: Other (use comment box)
  max_choices: 3
  page: '3'
  section: Goals and Plus Centrality
