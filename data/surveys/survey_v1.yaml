survey:
  key: survey_v1
  label: Survey v1
  is_active: true
  deactivate_missing: true
  discord_required: true
  shuffle: false
  discord_reason: Survey responses are limited to Discord-authenticated participants to reduce brigading.
  default_page: 1
  pages:
  - key: '1'
    title: Intro + Competitive Context
    order: 1
  - key: '2'
    title: Participation Behavior
    order: 2
  - key: '3'
    title: Goals + Plus Centrality
    order: 3
  - key: '4'
    title: Risk, Reward, and Safety
    order: 4
  - key: '5'
    title: Win vs Loss Impact
    order: 5
  - key: '6'
    title: Visibility Vignettes
    order: 6
  - key: '7'
    title: Credentialing Specifics
    order: 7
  - key: '8'
    title: Open-Ended
    order: 8
  - key: '9'
    title: Optional Follow-Up
    order: 9
questions:
- id: q01_consent
  name: Survey v1 Q0.1 Consent
  description: I agree to participate in this anonymous survey.
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: 'Yes'
  - name: No (I do not agree / end survey)
  page: '1'
  section: Consent
- id: q11_involvement
  name: Survey v1 Q1.1 Current Involvement
  description: Which best describes your current involvement?
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: I regularly compete (tournaments + organized practice)
  - name: I sometimes compete (occasional tournaments/scrims)
  - name: I'm trying to get more involved
  - name: I'm currently taking a break / stepping back
  - name: Prefer not to say
  page: '1'
  section: Your Current Competitive Context
- id: q12_level
  name: Survey v1 Q1.2 Self-Described Level
  description: Self-described level (pick what feels closest).
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: New to competitive
  - name: Low-level competitive
  - name: Mid-level competitive
  - name: High-level competitive
  - name: Top-level competitive
  - name: Prefer not to say
  page: '1'
  section: Your Current Competitive Context
- id: q13_last_3mo_activities
  name: Survey v1 Q1.3 Last 3 Months Participation
  description: 'Select all that apply: in the last 3 months, I have participated in...'
  comparison_mode: multi_select
  shuffle: true
  options:
  - name: Tournaments
  - name: Scrims (arranged practice vs another team)
  - name: Tryouts (performance may affect future invites)
  - name: Coaching (giving or receiving)
  - name: None of the above
  page: '1'
  section: Your Current Competitive Context
- id: q14_stable_team
  name: Survey v1 Q1.4 Stable Team Status
  description: Do you currently have a stable team?
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: Yes (stable roster + regular practice)
  - name: Somewhat (semi-stable / frequent mixes)
  - name: No (pickup/mixes/LFT)
  - name: Prefer not to say
  page: '1'
  section: Your Current Competitive Context
- id: q21_scrims_4w
  name: Survey v1 Q2.1 Scrims In Last 4 Weeks
  description: In the last 4 weeks, how many times did you scrim?
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: '0'
  - name: 1-2
  - name: 3-5
  - name: 6-10
  - name: 11+
  page: '2'
  section: Participation Behavior
- id: q22_tryouts_4w
  name: Survey v1 Q2.2 Tryouts In Last 4 Weeks
  description: In the last 4 weeks, how many tryouts did you do (as player or host)?
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: '0'
  - name: '1'
  - name: 2-3
  - name: 4-6
  - name: 7+
  page: '2'
  section: Participation Behavior
- id: q23_tournaments_4w
  name: Survey v1 Q2.3 Tournaments In Last 4 Weeks
  description: In the last 4 weeks, how many tournaments did you enter?
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: '0'
  - name: '1'
  - name: 2-3
  - name: 4+
  page: '2'
  section: Participation Behavior
- id: q24_more_or_less
  name: Survey v1 Q2.4 Desired Practice Volume
  description: Which is more true for you right now?
  comparison_mode: single_choice
  shuffle: false
  options:
  - name: I'd like to play/practice more than I currently do
  - name: I'm playing/practicing about as much as I want
  - name: I'd like to play/practice less than I currently do
  - name: Not sure
  page: '2'
  section: Participation Behavior
- id: q25_barriers
  name: Survey v1 Q2.5 Participation Barriers
  description: 'If you want to practice more: what is stopping you most? Pick up to 3.'
  comparison_mode: multi_select
  shuffle: true
  options:
  - name: Hard to get 4 people to commit
  - name: Hard to find similarly skilled opponents
  - name: Scheduling/time zones
  - name: Practice feels stressful / high-stakes
  - name: Fear of looking bad / reputational risk
  - name: Team instability / roster churn
  - name: I don't feel like practice translates into real improvement
  - name: Burnout / low motivation
  - name: Other (use comment box)
  max_choices: 3
  page: '2'
  section: Participation Behavior
- id: q31_goals
  name: Survey v1 Q3.1 Main Goals
  description: What are your main goals right now? Select up to 3.
  comparison_mode: multi_select
  shuffle: true
  options:
